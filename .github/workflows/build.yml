name: Build

on:
  push:
    branches: [main, develop]
    tags:
      - 'v*'
  pull_request:
    branches: [main, develop]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.11.1'
          modules: 'qt5compat qtshadertools'
          cache: true

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build build-essential libgl1-mesa-dev

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Build
        run: cmake --build build --parallel
      
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: compiled-application-linux
          path: |
            build/
            !build/CMake*
            !build/**/*.o
            !build/CMakeFiles

      - name: Create Release ZIP Archive
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          cd build
          zip -r ../compiled-application-linux.zip . -x "CMake*" "CMakeFiles*" "*.o"

      - name: Publish to GitHub Releases
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: compiled-application-linux.zip
          fail_on_unmatched_files: true
          generate_release_notes: true
