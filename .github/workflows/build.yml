name: Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.11.1'
          modules: 'qt5compat qtshadertools'
          cache: true

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build build-essential libgl1-mesa-dev

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Build
        run: cmake --build build --parallel
      
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: compiled-application-linux
          path: |
            build/
            !build/CMake*
            !build/**/*.o
            !build/CMakeFiles
